sonar.projectKey=echo
sonar.projectName=Echo
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8

# 분석 대상 (프론트 + 백엔드)
sonar.sources=echo-web/app,echo-web/components,echo-web/lib,echo-server/src/main/java
sonar.tests=echo-server/src/test/java

# 제외 경로
sonar.exclusions=**/node_modules/**,\
  **/.next/**,\
  **/target/**,\
  **/out/**,\
  **/build/**,\
  **/package-lock.json,\
  **/.understand-anything/**

# Java (Maven compile 후 SonarScanner 사용 시)
sonar.java.binaries=echo-server/target/classes
